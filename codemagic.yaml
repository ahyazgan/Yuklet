# ╔══════════════════════════════════════════════════════════════════╗
# ║  YÜKLET — Codemagic iOS build & App Store yükleme                  ║
# ║  Windows'ta Mac olmadan: Codemagic bulutta Mac makinede           ║
# ║  Vite build + Capacitor sync + Xcode archive + App Store Connect  ║
# ║  yüklemesi yapar.                                                  ║
# ║                                                                    ║
# ║  KURULUM (bir kez): codemagic.app > uygulama ekle > GitHub repo    ║
# ║  bağla > "Environment variables" ve "Code signing" ayarla.        ║
# ║  Detay: KURULUM-CODEMAGIC.md                                       ║
# ╚══════════════════════════════════════════════════════════════════╝

workflows:
  ios-appstore:
    name: YÜKLET iOS - App Store
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        # Supabase build-time anahtarlari (VITE_SUPABASE_URL + VITE_SUPABASE_ANON_KEY).
        # Codemagic UI'da "yuklet_supabase" grubu olarak eklenmeli; yoksa native
        # build sunucuya baglanamaz ("Sunucu baglantisi yapilandirilmamis").
        - yuklet_supabase
      vars:
        BUNDLE_ID: "com.yuklet.app"
        # Bu proje CocoaPods DEGIL Swift Package Manager (SPM) kullanir
        # (ios/App/CapApp-SPM). O yuzden .xcworkspace yok, .xcodeproj var.
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        APP_STORE_APPLE_ID: 0        # App Store Connect'te uygulama oluşunca sayısal ID'yi buraya yaz (opsiyonel)
      node: 22
      # xcode surumu SABIT: "latest" haber vermeden degisip calisan build'i
      # bozabilir. Ilk basarili build 26.4.1 ile alindi; ona sabitlendi.
      xcode: 26.4.1
    integrations:
      app_store_connect: yuklet_asc  # Codemagic UI'da ekleyeceğin App Store Connect API key adı
    scripts:
      - name: Ortam degiskenleri kontrolu
        script: |
          # Yazim hatasina karsi erken durdurma: bu adlar Codemagic UI'da
          # BIREBIR boyle olmali, yoksa uygulama sunucusuz (olu) derlenir.
          if [ -z "$VITE_SUPABASE_URL" ] || [ -z "$VITE_SUPABASE_ANON_KEY" ]; then
            echo "HATA: VITE_SUPABASE_URL ve/veya VITE_SUPABASE_ANON_KEY BOS geldi."
            echo "Codemagic > Settings > Environment variables'da adlar TAM olarak"
            echo "  VITE_SUPABASE_URL"
            echo "  VITE_SUPABASE_ANON_KEY"
            echo "olmali (yuklet_supabase grubunda). Muhtemel neden: yazim hatasi"
            echo "(orn. SUPBASE / SUPABAS gibi). Yanlis satiri silip dogru adla ekleyin."
            exit 1
          fi
          echo "Supabase ortam degiskenleri OK."

      - name: npm bağımlılıklarını kur
        script: |
          # npm ci yerine install: lock ile registry arasindaki kucuk
          # surum farklarina (emnapi 1.11.1 vs 1.11.2) takilmasin diye.
          npm install

      - name: Web'i derle (Vite)
        script: |
          npm run build

      - name: Capacitor iOS sync
        script: |
          npx cap sync ios

      # CocoaPods adimi YOK: proje SPM kullaniyor, Podfile yok.
      # SPM bagimliliklari Xcode archive sirasinda otomatik cozulur.

      - name: Build numarasını otomatik artır
        script: |
          cd ios/App
          agvtool new-version -all $(($(($BUILD_NUMBER)) + 1))

      - name: iOS imzalama dosyalarini olustur/cek
        script: |
          set -e
          keychain initialize

          # SERTIFIKA LIMITI KORUMASI (Apple limiti: hesap basina ~2-3):
          # Sertifika olusturmak icin gereken ozel anahtar, ONCE Codemagic
          # ortam degiskeninden (CM_CERTIFICATE_PRIVATE_KEY) okunur; boylece
          # her build AYNI anahtari kullanir, --create var olan sertifikayi
          # bulur ve YENI uretmez. Degisken yoksa (ilk kez) gecici bir anahtar
          # uretilir -- ilk build'den sonra bu anahtari Codemagic'e kaydet.
          CERT_KEY=/tmp/cert_key.pem
          if [ -n "$CM_CERTIFICATE_PRIVATE_KEY" ]; then
            printf '%s' "$CM_CERTIFICATE_PRIVATE_KEY" > $CERT_KEY
            echo "Kayitli imzalama anahtari kullanildi (sabit)."
          else
            openssl genrsa -out $CERT_KEY 2048
            echo "UYARI: Sabit anahtar yok, gecici uretildi. Ilk basarili"
            echo "build'den sonra bu anahtari Codemagic'e kaydet ki her build"
            echo "yeni sertifika uretip Apple limitini doldurmasin."
          fi

          # Bundle ID icin dagitim sertifikasi + App Store profilini olustur/
          # indir. --create: eslesen sertifika/profil YOKSA uretir, VARSA indirir.
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@file:$CERT_KEY \
            --create

          # Sertifikayi anahtarliga ekle
          keychain add-certificates

          # Profilleri Xcode projesine uygula.
          # NOT: Bu adim "Failed to set code signing settings" ile duserse
          # neredeyse her zaman App ID'nin capability'leri (Associated Domains,
          # Sign in with Apple) ile App.entitlements uyusmuyordur — portalda
          # com.yuklet.app kimliginde ilgili capability acilmali; profil
          # sonraki build'de otomatik yeniden uretilir.
          # (Eski "list-profiles --filter-bundle-id-identifier" teshis komutu
          # CLI'nin yeni surumunde kalkti; kaldirildi.)
          xcode-project use-profiles

      - name: Xcode archive & imzala
        script: |
          # Profil bilgisini use-profiles ~/export_options.plist'e yazar.
          # build-ipa bunu otomatik kullanir; boylece dogru (capability'li)
          # profil ve otomatik imzalama devreye girer.
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        # Build App Store Connect'e YUKLENIR (ic test icin hazir olur).
        # submit_to_testflight FALSE: dis beta review'a gonderme denenmez;
        # dis test icin test-info formu (feedback email, ad/soyad/telefon)
        # gerekir. Ic testte (kendi cihazin) bu form gerekmez.
        # Dis teste acmak istersen: bunu true yap + Apple'da test-info doldur.
        submit_to_testflight: false
        submit_to_app_store: false

  # ────────────────────────────────────────────────────────────────────
  # ANDROID — Play (AAB) · bulutta imzalı bundle üretir
  # KURULUM (bir kez): Codemagic UI > bu app > Environment variables >
  # "yuklet_android" GRUBU oluştur ve şu 4 değişkeni ekle (hepsi Secure):
  #   CM_KEYSTORE          = yuklet-upload.jks'nin BASE64'ü (aşağıdaki komut)
  #   CM_KEYSTORE_PASSWORD = keystore.properties'teki storePassword
  #   CM_KEY_ALIAS         = keystore.properties'teki keyAlias
  #   CM_KEY_PASSWORD      = keystore.properties'teki keyPassword
  # Windows'ta jks base64 üretmek (PowerShell):
  #   [Convert]::ToBase64String([IO.File]::ReadAllBytes("C:\Users\Yazgan\yuklet-imza\yuklet-upload.jks")) | Set-Clipboard
  # (Çıktı panoya kopyalanır → Codemagic'te CM_KEYSTORE değerine yapıştır.)
  # AAB artefaktını Codemagic build sayfasından indir → PLAY-KURULUM.md ile
  # Play Console kapalı teste yükle. (Otomatik yükleme için alttaki google_play
  # bloğunun yorumunu kaldır + Play service account JSON ekle.)
  # ────────────────────────────────────────────────────────────────────
  android-play:
    name: YÜKLET Android - Play (AAB)
    instance_type: linux_x2
    max_build_duration: 45
    environment:
      groups:
        - yuklet_android
        - yuklet_supabase   # VITE_SUPABASE_URL + VITE_SUPABASE_ANON_KEY (build-time)
      vars:
        PACKAGE_NAME: "com.yuklet.app"
      node: 22
      java: 17
    scripts:
      - name: Ortam degiskenleri kontrolu
        script: |
          # iOS workflow'undaki kontrolun aynisi (yazim hatasinda erken dur).
          if [ -z "$VITE_SUPABASE_URL" ] || [ -z "$VITE_SUPABASE_ANON_KEY" ]; then
            echo "HATA: VITE_SUPABASE_URL ve/veya VITE_SUPABASE_ANON_KEY BOS geldi."
            echo "Codemagic > Settings > Environment variables adlarini kontrol edin."
            exit 1
          fi
          echo "Supabase ortam degiskenleri OK."

      - name: npm bağımlılıklarını kur
        script: npm install

      - name: Web'i derle (Vite)
        script: npm run build

      - name: Capacitor Android sync
        script: npx cap sync android

      - name: İmza dosyalarını hazırla (keystore + keystore.properties)
        script: |
          set -e
          # jks'yi base64 env'den çöz (android/app/upload.jks)
          echo "$CM_KEYSTORE" | base64 --decode > "$CM_BUILD_DIR/android/app/upload.jks"
          # build.gradle rootProject (android/) altından okur → storeFile göreli
          cat > "$CM_BUILD_DIR/android/keystore.properties" <<EOF
          storeFile=app/upload.jks
          storePassword=$CM_KEYSTORE_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          keyPassword=$CM_KEY_PASSWORD
          EOF

      - name: versionCode'u otomatik artır (BUILD_NUMBER)
        script: |
          # Play strictly-increasing versionCode ister; CI build sayısıyla türet.
          # 100 offset: git'teki manuel değerlerin (şu an 2) üstünde kalsın.
          sed -i -E "s/versionCode [0-9]+/versionCode $((100 + BUILD_NUMBER))/" android/app/build.gradle
          grep -n "versionCode" android/app/build.gradle

      - name: Release AAB üret (imzalı)
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/mapping.txt
    # publishing:
    #   google_play:                 # OTOMATIK yükleme (opsiyonel)
    #     credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS  # Play service account JSON (Secure env)
    #     track: internal            # kapalı test = "internal"; ilk yükleme manuel yapılmalı
