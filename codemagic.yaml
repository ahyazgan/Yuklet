# ╔══════════════════════════════════════════════════════════════════╗
# ║  YÜKLET — Codemagic iOS build & App Store yükleme                  ║
# ║  Windows'ta Mac olmadan: Codemagic bulutta Mac makinede           ║
# ║  Vite build + Capacitor sync + Xcode archive + App Store Connect  ║
# ║  yüklemesi yapar.                                                  ║
# ║                                                                    ║
# ║  KURULUM (bir kez): codemagic.app > uygulama ekle > GitHub repo    ║
# ║  bağla > "Environment variables" ve "Code signing" ayarla.        ║
# ║  Detay: KURULUM-CODEMAGIC.md                                       ║
# ╚══════════════════════════════════════════════════════════════════╝

workflows:
  ios-appstore:
    name: YÜKLET iOS - App Store
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      vars:
        BUNDLE_ID: "com.yuklet.app"
        # Bu proje CocoaPods DEGIL Swift Package Manager (SPM) kullanir
        # (ios/App/CapApp-SPM). O yuzden .xcworkspace yok, .xcodeproj var.
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        APP_STORE_APPLE_ID: 0        # App Store Connect'te uygulama oluşunca sayısal ID'yi buraya yaz (opsiyonel)
      node: 22
      xcode: latest
    integrations:
      app_store_connect: yuklet_asc  # Codemagic UI'da ekleyeceğin App Store Connect API key adı
    scripts:
      - name: npm bağımlılıklarını kur
        script: |
          # npm ci yerine install: lock ile registry arasindaki kucuk
          # surum farklarina (emnapi 1.11.1 vs 1.11.2) takilmasin diye.
          npm install

      - name: Web'i derle (Vite)
        script: |
          npm run build

      - name: Capacitor iOS sync
        script: |
          npx cap sync ios

      # CocoaPods adimi YOK: proje SPM kullaniyor, Podfile yok.
      # SPM bagimliliklari Xcode archive sirasinda otomatik cozulur.

      - name: Build numarasını otomatik artır
        script: |
          cd ios/App
          agvtool new-version -all $(($(($BUILD_NUMBER)) + 1))

      - name: iOS imzalama ayarını çek (otomatik)
        script: |
          xcode-project use-profiles

      - name: Xcode archive & imzala
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        # TestFlight'a otomatik yükle (App Store'a yayın için false bırak, elle "Submit" yap):
        submit_to_testflight: true
        submit_to_app_store: false
