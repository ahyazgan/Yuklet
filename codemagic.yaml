# ╔══════════════════════════════════════════════════════════════════╗
# ║  YÜKLET — Codemagic iOS build & App Store yükleme                  ║
# ║  Windows'ta Mac olmadan: Codemagic bulutta Mac makinede           ║
# ║  Vite build + Capacitor sync + Xcode archive + App Store Connect  ║
# ║  yüklemesi yapar.                                                  ║
# ║                                                                    ║
# ║  KURULUM (bir kez): codemagic.app > uygulama ekle > GitHub repo    ║
# ║  bağla > "Environment variables" ve "Code signing" ayarla.        ║
# ║  Detay: KURULUM-CODEMAGIC.md                                       ║
# ╚══════════════════════════════════════════════════════════════════╝

workflows:
  ios-appstore:
    name: YÜKLET iOS - App Store
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      vars:
        BUNDLE_ID: "com.yuklet.app"
        # Bu proje CocoaPods DEGIL Swift Package Manager (SPM) kullanir
        # (ios/App/CapApp-SPM). O yuzden .xcworkspace yok, .xcodeproj var.
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        APP_STORE_APPLE_ID: 0        # App Store Connect'te uygulama oluşunca sayısal ID'yi buraya yaz (opsiyonel)
      node: 22
      xcode: latest
    integrations:
      app_store_connect: yuklet_asc  # Codemagic UI'da ekleyeceğin App Store Connect API key adı
    scripts:
      - name: npm bağımlılıklarını kur
        script: |
          # npm ci yerine install: lock ile registry arasindaki kucuk
          # surum farklarina (emnapi 1.11.1 vs 1.11.2) takilmasin diye.
          npm install

      - name: Web'i derle (Vite)
        script: |
          npm run build

      - name: Capacitor iOS sync
        script: |
          npx cap sync ios

      # CocoaPods adimi YOK: proje SPM kullaniyor, Podfile yok.
      # SPM bagimliliklari Xcode archive sirasinda otomatik cozulur.

      - name: Build numarasını otomatik artır
        script: |
          cd ios/App
          agvtool new-version -all $(($(($BUILD_NUMBER)) + 1))

      - name: iOS imzalama dosyalarini olustur/cek
        script: |
          set -e
          keychain initialize

          # 0) Sertifika olusturmak icin bir private key uret.
          #    fetch --create yeni dagitim sertifikasi olusturacaksa
          #    imzalamak icin bu anahtara ihtiyaci var; yoksa
          #    "Cannot save Signing Certificates without certificate
          #    private key" hatasi verir.
          openssl genrsa -out /tmp/cert_key.pem 2048

          # 1) Bundle ID icin dagitim sertifikasi + App Store profilini
          #    olustur/indir (--create: yoksa uret). Uretilen sertifika
          #    yukaridaki private key ile imzalanir.
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/cert_key.pem \
            --create

          # 2) Sertifikayi anahtarliga ekle
          keychain add-certificates

          # 3) Teshis: bu bundle id icin profiller
          echo "=== Bu bundle id icin profiller ==="
          app-store-connect list-profiles \
            --filter-bundle-id-identifier "$BUNDLE_ID" || true

          # 4) Profilleri Xcode projesine uygula
          xcode-project use-profiles

      - name: Xcode archive & imzala
        script: |
          # Profil bilgisini use-profiles ~/export_options.plist'e yazar.
          # build-ipa bunu otomatik kullanir; boylece dogru (capability'li)
          # profil ve otomatik imzalama devreye girer.
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        # Build App Store Connect'e YUKLENIR (ic test icin hazir olur).
        # submit_to_testflight FALSE: dis beta review'a gonderme denenmez;
        # dis test icin test-info formu (feedback email, ad/soyad/telefon)
        # gerekir. Ic testte (kendi cihazin) bu form gerekmez.
        # Dis teste acmak istersen: bunu true yap + Apple'da test-info doldur.
        submit_to_testflight: false
        submit_to_app_store: false
